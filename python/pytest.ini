[pytest]
asyncio_mode = auto
testpaths = tests

# ── Memory & performance safeguards ──────────────────────────────
timeout = 120
timeout_method = thread
#                   ^-- thread-based timeout is safe on Windows
#                       (requires `pytest-timeout` package)
addopts =
    -p no:cacheprovider
    --tb=short
    --no-header
    --durations=20
    --durations-min=1.0
