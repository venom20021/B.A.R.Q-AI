appId: com.barq.desktop
productName: BARQ
directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - "!node_modules/**/*"

extraResources:
  - from: python/dist/
    to: python/
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup-${arch}.${ext}

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

publish:
  provider: generic
  url: https://releases.barq.app
